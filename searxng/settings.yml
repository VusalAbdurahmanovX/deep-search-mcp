use_default_settings: true

server:
  secret_key: "deep-search-mcp-secret-change-me"
  bind_address: "0.0.0.0"
  port: 8080

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false

general:
  instance_name: "Deep Search MCP"
  debug: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 5.0
  useragent_suffix: "DeepSearchMCP"

redis:
  url: "redis://redis:6379/0"
