services:
  searxng:
    image: searxng/searxng:latest
    container_name: deep-search-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
    networks:
      - deep-search

  redis:
    image: redis:alpine
    container_name: deep-search-redis
    command: redis-server --save 30 1
    restart: unless-stopped
    networks:
      - deep-search

networks:
  deep-search:
    driver: bridge
